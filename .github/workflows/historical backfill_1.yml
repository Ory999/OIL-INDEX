name: Historical Backfill (Resumable)

# Runs every 2 hours automatically until all documents are scored
# Safe to run multiple times — resumes from last saved position
# Stop by disabling the workflow once pipeline_metadata shows complete
on:
  schedule:
    - cron: "0 */2 * * *"    # every 2 hours
  workflow_dispatch:
    inputs:
      start_year:
        description: "Start year for backfill (default 2007)"
        required: false
        default: "2007"
      confirm:
        description: "Type CONFIRM for manual trigger (auto runs skip this)"
        required: false
        default: "AUTO"

permissions:
  contents: write

jobs:
  backfill:
    name: Historical NLP Backfill (Resumable)
    runs-on: ubuntu-latest
    timeout-minutes: 60      # 1 hour per run

    # Allow auto scheduled runs OR manual runs with CONFIRM
    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.confirm == 'CONFIRM'

    env:
      START_DATE:   "2007-01-01"
      DATA_DIR:     data/raw
      FEATURES_DIR: data/features
      RESULTS_DIR:  data/results
      LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
      LLM_MODEL:    "openai/gpt-oss-20b"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt

      - name: Create data directories
        run: |
          mkdir -p data/raw data/features data/results
          mkdir -p data/raw/opec_pdfs data/raw/iea_texts
          mkdir -p data/raw/aramco_texts data/raw/eia_steo data/raw/energy_sec

      # ── Check if backfill is already complete ─────────────────────────
      - name: Check backfill completion status
        id: check_complete
        run: |
          if [ -f data/results/pipeline_metadata.json ]; then
            COMPLETE=$(python3 -c "
          import json
          with open('data/results/pipeline_metadata.json') as f:
              m = json.load(f)
          print(str(m.get('backfill_complete', False)).lower())
          " 2>/dev/null || echo "false")
            echo "complete=$COMPLETE" >> $GITHUB_OUTPUT
            echo "Backfill complete flag: $COMPLETE"
          else
            echo "complete=false" >> $GITHUB_OUTPUT
            echo "No metadata found — starting fresh"
          fi

      - name: Skip if already complete
        if: steps.check_complete.outputs.complete == 'true'
        run: |
          echo "✅ Backfill already marked complete — skipping"
          echo "Disable this workflow in GitHub Actions to stop scheduled runs"
          exit 0

      # ── Collection (only downloads missing files — safe to rerun) ─────
      - name: Collect OPEC Reports
        run: python3 "scripts/qual/13 collect opec.py"

      - name: Collect IEA Press Releases
        run: python3 "scripts/qual/14 collect iea.py"

      - name: Collect Saudi Aramco Press Releases
        run: python3 "scripts/qual/15 collect aramco.py"

      - name: Collect EIA STEO Narratives
        run: python3 "scripts/qual/16 collect eia steo.py"

      - name: Collect Energy Secretary Speeches
        run: python3 "scripts/qual/17 collect energy sec.py"

      - name: Build combined corpus
        run: python3 "scripts/qual/18 build corpus.py"

      # ── FinBERT (fast — always runs fully in one pass) ────────────────
      - name: FinBERT baseline scoring
        run: python3 "scripts/qual/19 finbert scoring.py"

      # ── LLM scoring — resumes from last saved position ────────────────
      - name: LLM multidimensional scoring (resumable)
        run: python3 "scripts/qual/20 llm scoring.py"
        timeout-minutes: 40    # leaves buffer for remaining steps
        env:
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL:    "openai/gpt-oss-20b"
        # Continue even if timeout — partial results are saved
        continue-on-error: true

      # ── Check scoring progress ────────────────────────────────────────
      - name: Check scoring progress
        id: progress
        run: |
          python3 -c "
          import pandas as pd
          from pathlib import Path

          corpus_path = Path('data/raw/finbert_scores.parquet')
          scores_path = Path('data/raw/llm_scores.parquet')

          if not corpus_path.exists():
              print('PROGRESS=0/0')
              exit()

          total = len(pd.read_parquet(corpus_path))

          if scores_path.exists():
              scored = len(pd.read_parquet(scores_path))
          else:
              scored = 0

          pct = scored / total * 100 if total > 0 else 0
          print(f'PROGRESS={scored}/{total} ({pct:.1f}%)')

          complete = scored >= total
          print(f'SCORING_COMPLETE={str(complete).lower()}')
          " | tee progress.txt

          # Export to GitHub outputs
          grep PROGRESS progress.txt | head -1 >> $GITHUB_OUTPUT
          grep SCORING_COMPLETE progress.txt >> $GITHUB_OUTPUT

      - name: Report scoring progress
        run: |
          echo "📊 LLM Scoring progress: ${{ steps.progress.outputs.PROGRESS }}"
          echo "   Complete: ${{ steps.progress.outputs.SCORING_COMPLETE }}"

      # ── Post-processing (only runs when scoring is complete) ──────────
      - name: BERTopic clustering (runs when scoring complete)
        if: steps.progress.outputs.SCORING_COMPLETE == 'true'
        run: python3 "scripts/qual/21 bertopic clustering.py"

      - name: Sentiment momentum features
        if: steps.progress.outputs.SCORING_COMPLETE == 'true'
        run: python3 "scripts/qual/22 sentiment momentum.py"

      - name: Merge NLP into master dataset
        if: steps.progress.outputs.SCORING_COMPLETE == 'true'
        run: python3 "scripts/qual/23 merge nlp master.py"

      # ── Mark complete in metadata when fully done ─────────────────────
      - name: Mark backfill complete
        if: steps.progress.outputs.SCORING_COMPLETE == 'true'
        run: |
          python3 -c "
          import json
          from pathlib import Path
          from datetime import datetime

          meta_path = Path('data/results/pipeline_metadata.json')
          metadata  = {}
          if meta_path.exists():
              with open(meta_path) as f:
                  metadata = json.load(f)

          metadata['backfill_complete']   = True
          metadata['backfill_completed_at'] = datetime.now().isoformat()
          metadata['backfill_start_year'] = '2007'

          with open(meta_path, 'w') as f:
              json.dump(metadata, f, indent=2)

          print('✅ Backfill marked complete in metadata')
          print('   You can now disable this workflow in GitHub Actions')
          "

      # ── Upload artefacts ──────────────────────────────────────────────
      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: backfill-${{ github.run_number }}
          path: |
            data/raw/llm_scores.parquet
            data/raw/combined_corpus.parquet
            data/raw/corpus_with_topics.parquet
            data/features/master_with_nlp.parquet
            data/results/pipeline_metadata.json
          retention-days: 7
          if-no-files-found: warn

      # ── Commit progress back to repo ──────────────────────────────────
      - name: Commit progress
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ || true
          git diff --staged --quiet || git commit -m "chore: backfill progress $(date +%Y-%m-%d %H:%M) — ${{ steps.progress.outputs.PROGRESS }}"
          git push || true

      # ── Final status report ───────────────────────────────────────────
      - name: Report status
        if: always()
        run: |
          echo "================================================"
          echo "Backfill run complete"
          echo "Progress: ${{ steps.progress.outputs.PROGRESS }}"
          if [ "${{ steps.progress.outputs.SCORING_COMPLETE }}" = "true" ]; then
            echo "✅ All documents scored — BERTopic + merge ran"
            echo "   Disable this workflow to stop scheduled runs"
          else
            echo "⏳ Scoring in progress — next run in 2 hours"
            echo "   Resume logic will pick up from current position"
          fi
          echo "================================================"