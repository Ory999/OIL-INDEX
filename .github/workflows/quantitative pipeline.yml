# Quantitative Pipeline
# Runs Mon-Fri at 06:00 UTC — fetches market data, assembles master dataset.
# Triggers the qualitative pipeline on completion via workflow_run.

name: Quantitative Pipeline

on:
  schedule:
    - cron: "0 6 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quantitative:
    name: Fetch & Assemble Quantitative Data
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      EIA_API_KEY:   ${{ secrets.EIA_API_KEY }}
      FRED_API_KEY:  ${{ secrets.FRED_API_KEY }}
      START_DATE:    "2007-01-01"
      DATA_DIR:      data/raw
      FEATURES_DIR:  data/features
      RESULTS_DIR:   data/results
      HISTORIC_DIR:  data/Historic

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install yfinance pandas numpy requests fredapi \
                       statsmodels scikit-learn shap scipy \
                       pyarrow python-dotenv tqdm matplotlib seaborn

      - name: Create data directories
        run: mkdir -p data/raw data/features data/results data/Historic

      - name: Fetch market prices
        run: python3 "scripts/quant/01 fetch prices.py"

      - name: Fetch EIA fundamentals
        run: python3 "scripts/quant/02 fetch eia.py"
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}

      - name: Fetch FRED macro controls
        run: python3 "scripts/quant/03 fetch fred.py"
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      - name: Fetch COT positioning
        run: python3 "scripts/quant/04 fetch cot.py"

      - name: Assemble master dataset
        run: python3 "scripts/quant/06 assemble master.py"

      - name: Build partial quantitative index
        run: python3 "scripts/quant/07 build quant index.py"

      - name: Build Price Sentiment Index (PSI)
        run: python3 "scripts/quant/14 build psi index.py"

      - name: Build Price Sentiment Index (PSI)
        run: python3 "scripts/quant/14 build psi index.py"

      - name: Upload data artefacts
        uses: actions/upload-artifact@v4
        with:
          name: quant-data-${{ github.run_number }}
          path: |
            data/raw/*.parquet
            data/features/*.parquet
            data/results/*.csv
            data/results/*.json
            data/results/psi_final.parquet
            data/results/psi_dashboard.png
          retention-days: 7
          if-no-files-found: warn

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ || true
          git diff --staged --quiet || git commit -m "chore: daily quant update $(date +%Y-%m-%d)"
          git push || true

      - name: Report status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Quantitative pipeline completed successfully"
            cat data/results/pipeline_metadata.json 2>/dev/null || true
          else
            echo "❌ Quantitative pipeline FAILED"
            exit 1
          fi
