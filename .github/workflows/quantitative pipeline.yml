name: Quantitative Pipeline

on:
  schedule:
    - cron: "0 6 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quantitative:
    name: Fetch & Assemble Quantitative Data
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      EIA_API_KEY:   ${{ secrets.EIA_API_KEY }}
      FRED_API_KEY:  ${{ secrets.FRED_API_KEY }}
      START_DATE:    "2007-01-01"
      DATA_DIR:      data/raw
      FEATURES_DIR:  data/features
      RESULTS_DIR:   data/results

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt

      - name: Create data directories
        run: mkdir -p data/raw data/features data/results

      - name: "[01] Fetch market prices"
        run: python3 "scripts/01 fetch prices.py"

      - name: "[02] Fetch EIA fundamentals"
        run: python3 "scripts/02 fetch eia.py"
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}

      - name: "[03] Fetch FRED macro controls"
        run: python3 "scripts/03 fetch fred.py"
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      - name: "[04] Fetch COT positioning"
        run: python3 "scripts/04 fetch cot.py"

      - name: "[06] Assemble master dataset"
        run: python3 "scripts/06 assemble master.py"

      - name: "[07] Build partial quantitative index"
        run: python3 "scripts/07 build quant index.py"

      - name: Upload data artefacts
        uses: actions/upload-artifact@v4
        with:
          name: quant-data-${{ github.run_number }}
          path: |
            data/raw/*.parquet
            data/features/*.parquet
            data/results/*.csv
            data/results/*.json
          retention-days: 7

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ || true
          git diff --staged --quiet || git commit -m "chore: daily quant update $(date +%Y-%m-%d)"
          git push || true

      - name: Report status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Pipeline completed successfully"
            cat data/results/pipeline_metadata.json 2>/dev/null || true
          else
            echo "❌ Pipeline FAILED"
            exit 1
          fi
