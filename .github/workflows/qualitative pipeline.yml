name: Qualitative NLP Pipeline

on:
  schedule:
    - cron: "30 6 * * 1-5"   # 06:30 UTC Mon-Fri (30 min after quantitative)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  qualitative:
    name: Collect & Score Institutional Reports
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      ANTHROPIC_API_KEY: ${{ secrets.APIKEY }}
      START_DATE:        "2007-01-01"
      DATA_DIR:          data/raw
      FEATURES_DIR:      data/features
      RESULTS_DIR:       data/results
      LLM_BASE_URL:      "http://localhost:11434/v1"  # local model endpoint
      LLM_MODEL:         "gpt2oss"                    # locally hosted model name

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt

      - name: Create data directories
        run: mkdir -p data/raw data/features data/results data/raw/opec_pdfs data/raw/iea_texts data/raw/aramco_texts data/raw/eia_steo data/raw/energy_sec

      - name: "Collect OPEC Monthly Reports"
        run: python3 "scripts/qual/13 collect opec.py"

      - name: "Collect IEA Press Releases"
        run: python3 "scripts/qual/14 collect iea.py"

      - name: "Collect Saudi Aramco Press Releases"
        run: python3 "scripts/qual/15 collect aramco.py"

      - name: "Collect EIA STEO Narratives"
        run: python3 "scripts/qual/16 collect eia steo.py"

      - name: "Collect US Energy Secretary Speeches"
        run: python3 "scripts/qual/17 collect energy sec.py"

      - name: "Build combined corpus"
        run: python3 "scripts/qual/18 build corpus.py"

      - name: "FinBERT baseline scoring"
        run: python3 "scripts/qual/19 finbert scoring.py"

      - name: "LLM multidimensional scoring"
        run: python3 "scripts/qual/20 llm scoring.py"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.APIKEY }}

      - name: "BERTopic topic clustering"
        run: python3 "scripts/qual/21 bertopic clustering.py"

      - name: "Sentiment momentum features"
        run: python3 "scripts/qual/22 sentiment momentum.py"

      - name: "Merge NLP scores into master dataset"
        run: python3 "scripts/qual/23 merge nlp master.py"

      - name: Upload NLP artefacts
        uses: actions/upload-artifact@v4
        with:
          name: nlp-data-${{ github.run_number }}
          path: |
            data/raw/opec_corpus.parquet
            data/raw/iea_corpus.parquet
            data/raw/aramco_corpus.parquet
            data/raw/eia_steo_corpus.parquet
            data/raw/energy_sec_corpus.parquet
            data/raw/combined_corpus.parquet
            data/features/master_with_nlp.parquet
            data/results/nlp_scores.parquet
          retention-days: 7

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ || true
          git diff --staged --quiet || git commit -m "chore: daily NLP update $(date +%Y-%m-%d)"
          git push || true

      - name: Report status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Qualitative pipeline completed successfully"
            cat data/results/pipeline_metadata.json 2>/dev/null || true
          else
            echo "❌ Qualitative pipeline FAILED"
            exit 1
          fi
