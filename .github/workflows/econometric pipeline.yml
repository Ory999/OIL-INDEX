name: Econometric Analysis (Full PRCSI)

on:
  workflow_run:
    workflows: ["Qualitative NLP Pipeline"]
    types: [completed]
  workflow_dispatch:

jobs:
  econometrics:
    name: Granger + VAR + PRCSI Index
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt

      - name: Check qualitative scores are available
        run: |
          if [ ! -f data/features/master_with_nlp.parquet ]; then
            echo "⚠️  master_with_nlp.parquet not found"
            echo "   Falling back to quantitative-only master dataset"
            cp data/features/master_quant.parquet data/features/master_with_nlp.parquet || true
          else
            echo "✅ NLP scores found — running full combined Granger test"
          fi

      - name: "[08] Stationarity tests"
        run: python3 "scripts/08 stationarity.py"

      - name: "[09] Granger causality"
        run: python3 "scripts/09 granger causality.py"

      - name: "[10] VAR model + IRF"
        run: python3 "scripts/10 var irf.py"

      - name: "[11] SHAP feature importance"
        run: python3 "scripts/11 shap analysis.py"

      - name: "[12] Build full PRCSI index"
        run: python3 "scripts/12 build full index.py"

      - name: Upload econometric results
        uses: actions/upload-artifact@v4
        with:
          name: econometric-results-${{ github.run_number }}
          path: data/results/
          retention-days: 30

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/results/ || true
          git diff --staged --quiet || git commit -m "chore: econometric results $(date +%Y-%m-%d)"
          git push || true
