name: Econometric Analysis (Full PRCSI)

on:
  workflow_run:
    workflows: ["Qualitative NLP Pipeline"]
    types: [completed]
  workflow_dispatch:

jobs:
  econometrics:
    name: Granger + VAR + PRCSI Index
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    env:
      FEATURES_DIR: data/features
      RESULTS_DIR:  data/results

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt

      - name: Create data directories
        run: mkdir -p data/features data/results

      - name: Check qualitative scores are available
        run: |
          if [ ! -f data/features/master_with_nlp.parquet ]; then
            echo "⚠️  master_with_nlp.parquet not found"
            echo "   Falling back to quantitative-only master dataset"
            cp data/features/master_quant.parquet data/features/master_with_nlp.parquet || true
          else
            echo "✅ NLP scores found — running full combined Granger test"
          fi

      - name: Stationarity tests
        run: python3 "quant/08 stationarity.py"

      - name: Granger causality
        run: python3 "quant/09 granger causality.py"

      - name: VAR model and IRF
        run: python3 "quant/10 var irf.py"

      - name: SHAP feature importance
        run: python3 "quant/11 shap analysis.py"

      - name: Build full PRCSI index
        run: python3 "quant/12 build full index.py"

      - name: Upload econometric results
        uses: actions/upload-artifact@v4
        with:
          name: econometric-results-${{ github.run_number }}
          path: data/results/
          retention-days: 30

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/results/ || true
          git diff --staged --quiet || git commit -m "chore: econometric results $(date +%Y-%m-%d)"
          git push || true

      - name: Report status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Econometric pipeline completed successfully"
            cat data/results/pipeline_metadata.json 2>/dev/null || true
          else
            echo "❌ Econometric pipeline FAILED"
            exit 1
          fi
